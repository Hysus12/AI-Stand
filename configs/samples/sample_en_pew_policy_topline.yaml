    scoring_direction: positive_high
  - question_id: q35m_high_income_tax
    question_text: Raise the income tax rate on incomes over $250,000 a year.
    question_type: single_choice
    options: ["Approve", "Disapprove", "Don't know"]
    tags: ["tax", "high_income"]
