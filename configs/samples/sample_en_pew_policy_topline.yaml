    question_type: single_choice
    options: ["Approve", "Disapprove", "Don't know"]
    tags: ["science", "spending cuts"]
    theme: spending cuts
    scoring_direction: positive_low
generation_settings:
  synthetic_respondent_count: 500
  random_seed: 42
inference_settings:
  primary_strategy: deepseek_direct
  fallback_strategy: heuristic
  max_retry_attempts: 0
