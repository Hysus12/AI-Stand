    question_type: single_choice
    options: ["Approve", "Disapprove", "Don't know"]
    tags: ["medicare", "means_testing"]
    theme: entitlement reform
    scoring_direction: positive_low
  - question_id: q35h_defense_cuts
    question_text: Reduce military defense spending.
    question_type: single_choice
    options: ["Approve", "Disapprove", "Don't know"]
    tags: ["defense", "spending cuts"]
