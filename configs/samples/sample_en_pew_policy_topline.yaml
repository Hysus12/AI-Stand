    scoring_direction: positive_high
  - question_id: q35j_student_loans
    question_text: Reduce federal funding for college student loan programs.
    question_type: single_choice
    options: ["Approve", "Disapprove", "Don't know"]
    tags: ["education", "student_loans"]
    theme: spending cuts
    scoring_direction: positive_low
  - question_id: q35k_corporate_deductions
    question_text: Limit tax deductions for large corporations.
    question_type: single_choice
    options: ["Approve", "Disapprove", "Don't know"]
    tags: ["tax", "corporations"]
