project_id: sample_en_pew_policy_topline
product_name: Pew Debt Reduction Policy Sample
product_brief: >
  Internal end-to-end sample built from Pew Research Center's October 2012 debt-reduction
  topline questionnaire. The goal is to test whether the Pilot MVP can ingest a real English
  policy-attitudes project, generate segment-level outputs, and compare AI distributions against
  public topline percentages without turning the sample into a benchmark study.
category: public policy opinion sample
category_hints:
  - U.S. public opinion
  - policy approval
  - debt reduction
target_segments:
  - segment_id: fiscal_hawks
    segment_name: Fiscal hawks
    demographic_description: Voters who prioritize deficit reduction and are relatively open to spending cuts.
    psychographic_description: Concerned about debt levels and more accepting of painful trade-offs.
    behavioral_description: Less protective of federal programs if cuts are framed as deficit reduction.
    population_struct:
      ideology: conservative
      region: United States
    estimated_weight: 0.32
  - segment_id: tax_and_invest_moderates
    segment_name: Tax-and-invest moderates
    demographic_description: Middle-of-the-road voters who prefer deficit reduction through higher taxes on affluent households and corporations.
    psychographic_description: Want fiscal restraint but resist sharp cuts to education and social supports.
    behavioral_description: More likely to back progressive revenue solutions than benefit cuts.
    population_struct:
      ideology: moderate
      region: United States
    estimated_weight: 0.38
  - segment_id: social_program_defenders
    segment_name: Social program defenders
    demographic_description: Voters who strongly protect education, Medicare, student loans, and anti-poverty programs.
    psychographic_description: View deficit reduction through social cuts as unfair or harmful.
    behavioral_description: More willing to support tax increases than reductions in social spending.
    population_struct:
      ideology: liberal
      region: United States
    estimated_weight: 0.30
survey_questions:
  - question_id: q35a_low_income_programs
    question_text: Reduce federal funding for programs that help lower income Americans.
    question_type: single_choice
    options: ["Approve", "Disapprove", "Don't know"]
    tags: ["deficit", "anti_poverty"]
    theme: spending cuts
    scoring_direction: positive_low
  - question_id: q35b_social_security_age
    question_text: Gradually raise the age at which people can begin receiving Social Security benefits.
    question_type: single_choice
    options: ["Approve", "Disapprove", "Don't know"]
    tags: ["deficit", "social_security"]
    theme: entitlement reform
    scoring_direction: positive_low
  - question_id: q35c_education_cuts
